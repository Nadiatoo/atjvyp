    - 央行
    - 降准
    - 降息
    - 货币政策
    - 财政政策
    - 证监会
    - 银保监会
    - 发改委
    - 国务院
    - 两会
    - 政治局
    
  sectors:
    - 新能源
    - 芯片
    - 半导体
    - 人工智能
    - AI
    - 房地产
    - 基建
    - 消费
    - 医药
    - 军工
    - 券商
    - 银行
    - 保险
    
  market:
    - A股
    - 股市
    - 大盘
    - 指数
    - 涨停
    - 跌停
    - 北向资金
    - 南向资金
